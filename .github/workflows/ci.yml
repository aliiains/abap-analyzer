name: ABAP Analyzer CI Pipeline

# Запускается при пуше в любую ветку и при создании Pull Request
on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Проверка качества кода
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Кэширование зависимостей для ускорения
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov black mypy bandit
      
      - name: Check formatting with Black
        run: black --check --diff .
        continue-on-error: true  # Не останавливает пайплайн, только предупреждает
      
      - name: Lint with Flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --count \
            --show-source \
            -- \
            --exclude=tests/,venv/,__pycache__/
      
      - name: Type checking with MyPy
        run: mypy . --ignore-missing-imports --exclude=tests/
        continue-on-error: true  # Не критично, но полезно
      
      - name: Security check with Bandit
        run: bandit -r . -x tests/,venv/
        continue-on-error: true

  # Job 2: Запуск тестов tests:
    name: Run Tests
    needs: code-quality  # Запускается только после code-quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80  # Минимальное покрытие 80%
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7 ранить 7 дней

  # Job 3: Функциональное тестирование анализатора
  functional-test:
    name: Functional Test with Real ABAP
    needs: tests  # Запускается после тестов
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || true
      
      - name: Create test ABAP file
        run: |
          cat > test_abap_code.abap << 'EOF'
          * Тестовый ABAP код
          REPORT ztest.
          
          DATA: lv_counter TYPE i VALUE 10.
          
          START-OF-SELECTION.
            IF lv_counter > 5.
              WRITE: / 'Counter is greater than 5'.
            ELSE.
              WRITE: / 'Counter is less or equal to 5'.
            ENDIF.
            
            PERFORM increment USING lv_counter.
          
          FORM increment USING value(p_num) TYPE i.
            p_num = p_num + 1.
          ENDFORM.
          EOF
      
      - name: Run analyzer on test file
        run: |
          echo "Test ABAP code:"
          cat test_abap_code.abap
          echo ""
          echo "Analyzer output:"
          python main.py --input test_abap_code.abap --output report.txt
      
      - name: Display generated report
        run: |
          if [ -f report.txt ]; then
            echo "=== Analysis Report ==="
            cat report.txt
          else
            echo "Report file not found!"
            exit 1
          fi

  # Job 4: Проверка покрытия и метрик
  metrics-check:
    name: Code Metrics Check
    needs: tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Total Python files: $(find . -name '*.py' -not -path './.venv/*' | wc -l)"
          echo "Total lines of code: $(find . -name '*.py' -not -path './.venv/*' -exec cat {} + | wc -l)"
          echo ""
          echo "=== File sizes ==="
          find . -name '*.py' -not -path './.venv/*' -exec wc -l {} + | sort -n
      
      - name: Check minimum code requirement (2000 lines)
        run: |
          TOTAL_LINES=$(find . -name '*.py' -not -path './.venv/*' -exec cat {} + | wc -l)
          echo "Total lines: $TOTAL_LINES"
          if [ "$TOTAL_LINES" -lt 2000 ]; then
            echo "❌ Code is too short! Need at least 2000 lines, but got $TOTAL_LINES"
            exit 1
          else
            echo "✅ Code meets minimum requirement of 2000 lines"
          fi
