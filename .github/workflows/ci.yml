name: ABAP Analyzer CI (tolerant)

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install formatters and linters
        run: pip install autopep8 flake8 pytest

      - name: Auto-fix formatting (safe changes only)
        run: |
          autopep8 --in-place --aggressive --max-line-length 120 -r .
          echo "Auto-fix completed"

      - name: Show remaining lint issues (non-blocking)
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=tests/,.venv/ \
            --ignore=E221,E272,E127,E203,F541,F841 \
            --exit-zero
      - name: Run tests (if exist)
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "No tests folder — skipping"
          fi

